name: life-reborn CI (forgejo)

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:

jobs:
  test:
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          LIFE_REBORN_BEARER: ${{ secrets.LIFE_REBORN_BEARER }}
          LIFE_INTERNAL_BEARER: ${{ secrets.LIFE_INTERNAL_BEARER }}
        run: npm test
